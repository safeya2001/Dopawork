databases:
  - name: dopawork-db
    databaseName: dopawork
    user: dopawork
    plan: free

services:
  - type: web
    name: dopawork
    env: docker
    dockerfilePath: ./dopa-work/Dockerfile
    dockerContext: ./dopa-work
    plan: free
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        sync: false
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: dopawork-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: dopawork-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: dopawork-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: dopawork-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: dopawork-db
          property: password
      - key: MAIL_MAILER
        value: log
      - key: SESSION_DRIVER
        value: file
      - key: CACHE_DRIVER
        value: file
      - key: QUEUE_CONNECTION
        value: sync
